# 거대정당 (big-party) classification by election date.
# is_big_party(name, ts) returns True if party was classified as 거대정당
# at the most recent prior cutoff date.
#
# A party qualifies as 거대정당 if it nominates candidates in 광역
# (e.g. all 17 시·도 단체장) OR holds >5% national assembly seats.
# These are coarse-grained snapshots — accurate enough for tier
# promotion but not for fine-grained electoral analysis.
