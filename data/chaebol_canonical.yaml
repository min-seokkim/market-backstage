# PR4-CANONICAL — chaebol canonical organizations.
#
# yaml seed (git-versioned bootstrap anchor) → actor_canonical_links
# (canonical_type='organization'). 진짜 DB의 FTC `unityGrupNm` form
# (한글 음차) 기준. C1 진단 결과 영문 form (SK/LG/GS/CJ/KT/LS) 0건 —
# 전부 한글 음차 (에스케이·엘지·지에스·씨제이·케이티·엘에스).
#
# Top 30 hand-curated. Rest는 C2 LLM auto-gen으로 proposed 박힘 후
# trust accrual로 active promote.
#
# Form per entry:
#   - canonical_org_id: stable internal id (English transliteration, snake_case)
#     name_ko: FTC 한글 form (DB의 current_corp_group과 일치)
#     tier: 1~5 (chaebol_classification.yaml과 일치)
#     economic_tier: tier (compute_economic_tier 결과)
#     representative_companies: 대표 계열사 list (cross-source matching anchor)
#
# C4 retrofit이 actors_dyn.canonical_org_id를 backfill하면, 한 group의
# 모든 owner·executive actor가 동일 canonical_org_id로 collapse.

groups:

