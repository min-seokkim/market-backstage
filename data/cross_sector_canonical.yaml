# data/cross_sector_canonical.yaml
#
# Hand-curated seed list — PR4-CANONICAL의 cross-sector matching anchor.
#
# 진짜 같은 사람의 정치 actor (NEC·ASSEMBLY) ↔ 경제 actor (FTC·DART) 매핑.
# Birthday·hanja·진짜 actor ID는 PR4-CANONICAL이 NEC alias·DART executive에서
# 자동 추출. 이 file은 "어떤 이름·context가 cross-sector인지" anchor만 박음.
#
# Form per entry:
#   - name: 한글 이름
#     political_roles: [의원, 장관, 대선후보, 청와대비서실장, 검사, 판사, ...]
#     political_parties: [당명 list, optional]
#     economic_organizations: [회사·재단·로펌·협회·학교 list]
#     economic_roles: [owner_family, executive, board_member, foundation_chair, partner, professor]
#     rationale: 한 줄 explanation
#     confidence: high | medium | low
#       high   = 다 알려진·verified cases
#       medium = 알려진·일부 detail uncertain
#       low    = less-known·LLM disambiguation 필요
#
# Source: Claude의 학습 데이터 (cutoff Jan 2026).
# 추가/수정은 PR4-CANONICAL의 자동 generation pipeline에서.

