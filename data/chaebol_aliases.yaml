# PR4-CANONICAL — chaebol alias seed.
#
# yaml seed (state='active', source='yaml_seed') → chaebol_aliases_state.
# 진단 결과 FTC `unityGrupNm`은 한글 음차 only (영문 form 0건). 영문은
# 매체·사용자가 쓰는 form일 뿐 — 여기서 alias로 흡수되어 canonical_org_id로
# resolve.
#
# Top 30 hand-curated. C2가 LLM call 박아 ~20개 추가 form proposed로 박음
# (확인 후 active promote).
#
# Form: canonical_org_id → list of alias forms (NFKC normalized at insert time).
#
# Coverage 의도:
#   - FTC 한글 form (DB의 current_corp_group과 일치)
#   - 영문 (사람들·매체가 쓰는 form)
#   - 한글 + "그룹"
#   - 영문 + "Group" / "Inc" / "Holdings"
#   - 한자 (있으면)
#   - history transition form (e.g. SK ← 선경)

