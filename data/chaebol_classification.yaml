# Chaebol group ranking — coarse partition.
#   1 = 5대 (top 5)
#   2 = 6~30대
#   3 = 31~50대
#   4 = 51~100대
#   5 = 100대 외 (default for unmapped)
#
# Group names match FTC OpenAPI `unityGrupNm` exactly. PR4-CANONICAL C1
# 진단 결과 FTC는 한글 음차 form만 박음 (영문 SK/LG/GS/CJ/KT/LS/KT&G는
# DB에 0건). 영문 form은 chaebol_aliases.yaml로 옮김 — chaebol_aliases_state
# 거쳐 canonical_org_id로 resolve.
#
# `default` table은 대부분 연도. year-specific override가 필요하면
# `rankings.<year>` 추가 가능.
rankings:
  default:
    # ---- 1: 5대 ----
    삼성: 1
    에스케이: 1
    현대자동차: 1
    엘지: 1
    롯데: 1

