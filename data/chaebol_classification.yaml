# Chaebol group ranking — coarse partition.
#   1 = 5대 (top 5)
#   2 = 6~30대
#   3 = 31~50대
#   4 = 51~100대
#   5 = 100대 외 (default for unmapped)
#
# Group names match FTC OpenAPI `unityGrupNm` exactly. `default` table
# covers most years; year-specific overrides can be added under
# `rankings.<year>` if (rare) historical reordering happens.
rankings:
  default:
    # ---- 1: 5대 ----
    # FTC API returns Korean transliterations for English-named groups
    # (SK → 에스케이, LG → 엘지). We map both forms to tier 1.
    삼성: 1
    SK: 1
    에스케이: 1
    현대자동차: 1
    LG: 1
    엘지: 1
    롯데: 1
