# Catalog Recall target events
#
# Question: starting from a seed catalog that *excludes* the 2025-2026 reform
# regime, can the agenda extractor catch these 12 events purely from broad
# document ingest? If recall < 0.75 or latency > 7d, refactor the extractor.
#
# Each entry:
#   id              : stable identifier (used in run_log keys)
#   label           : Korean display
#   emergence_date  : when this event first becomes detectable in real docs
#   expected_window_days : how soon after emergence we should catch it
#   detection_hint  : keywords / phrases that would have to appear in a doc
#                     for the LLM to plausibly identify the event. Used only
#                     in the metric harness to verify that the document corpus
#                     *had* the signal — not in the extractor itself.
#   acceptance      : for diagnostics only (extractor must propose new
#                     EventTemplate matching these affects_actors / category)

events:
