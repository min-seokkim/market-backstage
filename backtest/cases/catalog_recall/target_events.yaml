    label: "1차 상법 개정 통과 (이사 충실의무 확대)"
    emergence_date: 2025-07-03
    expected_window_days: 3
    detection_hint:
      - "충실의무 확대"
      - "상법 개정안 본회의"
    acceptance:
      category: legal
      affects_actors_must_include:
        - chaebol_chair_samsung
