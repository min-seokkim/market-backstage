# Actor Catalog — Phase 3 정의 파일
#
# 각 actor의 *정적 신원*과 *데이터 소스*만 여기에 둔다. trait/interest/belief 값은
# 절대 하드코딩하지 않는다. 그것들은 calibration.py가 ingest된 1차자료(documents)
# + LLM 추정으로 채운다.
#
# 필드:
# - id          : 안정적 식별자 (variables.py affects_actors와 동기화)
# - name        : 한국어 표시명
# - category    : government | politics | chaebol | family | investor | external
# - role        : head_of_state | minister | regulator | central_banker
#                 | party_leader | chaebol_chair | chaebol_cfo
#                 | family_dispute | fund_pm | retail_aggregate | foreign_state
# - mvp         : true → run_demo의 기본 활성 roster
# - activation  : always_on | event_triggered
# - identity    :
#     keywords  : 이 actor에 대한 문서를 fetch_documents_for_actor가 매칭할 때 사용
#     notes     : 자유 메모 (배경, 권력 범위)
# - sources     : 이 actor와 관련된 ingest 어댑터 + 파라미터
# - schema      : ActionSchema (market_actions, policy, statement, disclosure, weight)
# - decision_variables : null이면 loader가 variables.for_actor(id)에서 자동 채움.
#                        명시하면 그 목록만 사용.
# - notes       : 자유 메모

